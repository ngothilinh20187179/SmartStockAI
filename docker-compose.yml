services:  
  # Database service definition
  db:
    image: postgres:16-alpine             # Use the lightweight Alpine Linux version of PostgreSQL 16
    container_name: ${DB_NAME}_container
    restart: always  
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # FastAPI Backend service definition
  backend:
    build: ./backend
    container_name: smartstock_backend
    command: >
      sh -c "alembic upgrade head &&
             python scripts/check_db.py &&
             python scripts/seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # command: tail -f /dev/null
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      DB_HOST: db
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy

# Define the named volumes used in the services section
volumes:
  # This volume ensures data persists even if the container is removed
  postgres_data: